<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Personales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1ECE3;
    --paper:#FFFFFF;
    --hero:#1D1A15;
    --ink:#1F1B15;
    --ink-soft:#897F70;
    --accent:#D85C32;
    --display:'Space Grotesk', system-ui, sans-serif;
    --ui:'Plus Jakarta Sans', system-ui, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    background:
      radial-gradient(120% 80% at 50% 0%, #ECE6DB 0%, #E4DCCF 60%, #DCD3C3 100%);
    font-family:var(--ui);
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  #stage{ transform-origin:center center; }
  ::-webkit-scrollbar{ width:0; height:0; }
  button{ font-family:inherit; }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#1D1A15">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#1D1A15"/>
      <rect x="360" y="250" width="480" height="300" rx="44" fill="#F1ECE3"/>
      <circle cx="600" cy="400" r="96" fill="none" stroke="#D85C32" stroke-width="34"/>
      <circle cx="600" cy="400" r="96" fill="none" stroke="#E0913C" stroke-width="34" stroke-dasharray="150 453" stroke-dashoffset="-300" transform="rotate(-90 600 400)"/>
      <circle cx="600" cy="400" r="96" fill="none" stroke="#3E6B57" stroke-width="34" stroke-dasharray="90 453" stroke-dashoffset="-470" transform="rotate(-90 600 400)"/>
    </svg>
  </template>

  <div id="stage"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/Dashboard.jsx"></script>
  <script type="text/babel" src="app/History.jsx"></script>
  <script type="text/babel" src="app/AddExpense.jsx"></script>
  <script type="text/babel" src="app/Settings.jsx"></script>
  <script type="text/babel" src="app/CategoriesManager.jsx"></script>
  <script type="text/babel" src="app/App.jsx"></script>

  <script type="text/babel" data-presets="react">
    const DEV_W = 402, DEV_H = 874;
    function Root(){
      return (
        <IOSDevice width={DEV_W} height={DEV_H} dark={false}>
          <App />
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

    function fit(){
      const pad = 24;
      const s = Math.min((window.innerWidth-pad*2)/DEV_W, (window.innerHeight-pad*2)/DEV_H, 1.05);
      document.getElementById('stage').style.transform = 'scale('+s+')';
    }
    window.addEventListener('resize', fit);
    setTimeout(fit, 60); fit();
  </script>
</body>
</html>
