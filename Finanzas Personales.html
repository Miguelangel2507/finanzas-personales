function fmtNum(n, decimals) {
  const num = Number(n) || 0;
  const neg = num < 0;
  const abs = Math.abs(num);
  const d = decimals === undefined ? (Number.isInteger(abs) ? 0 : 2) : decimals;
  const fixed = abs.toFixed(d);
  const parts = fixed.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  const out = parts.length > 1 ? parts[0] + ',' + parts[1] : parts[0];
  return (neg ? '-' : '') + out;
}

  <!-- Shared components -->
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

function CatIcon({ cat, size=44, radius=14, iconScale=0.55 }) {
  const inner = Math.round(size * iconScale);
  return (
    <div style={{ width:size, height:size, borderRadius:radius, flexShrink:0,
      background:cat.color+'1A', color:cat.color,
      display:'flex', alignItems:'center', justifyContent:'center' }}>
      <svg width={inner} height={inner} viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d={cat.icon} />
      </svg>
    </div>
  );
}

function Donut({ slices, size=188, stroke=26, gap=0.018, children, animate=true }) {
  const total = slices.reduce((s,x)=>s+x.value,0) || 1;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const [t, setT] = useState(animate ? 0 : 1);
  useEffect(() => {
    if (!animate) return;
    let raf, start;
    const dur = 900;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      setT(1 - Math.pow(1-p, 3));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, []);

  let offset = 0;
  const arcs = slices.map((s, i) => {
    const frac = s.value / total;
    const len = Math.max(0, (frac - gap) * c) * t;
    const dash = `${len} ${c - len}`;
    const el = (
      <circle key={i} cx={size/2} cy={size/2} r={r} fill="none"
        stroke={s.color} strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={dash}
        strokeDashoffset={-offset * c * t + 0.001}
        transform={`rotate(-90 ${size/2} ${size/2})`} />
    );
    offset += frac;
    return el;
  });

  return (
    <div style={{ position:'relative', width:size, height:size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#00000008" strokeWidth={stroke} />
        {arcs}
      </svg>
      {children && (
        <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', textAlign:'center' }}>
          {children}
        </div>
      )}
    </div>
  );
}

function ProgressBar({ value, max, color, track='#00000010', height=6 }) {
  const pct = Math.max(0, Math.min(1, max>0 ? value/max : 0));
  return (
    <div style={{ height, borderRadius:99, background:track, overflow:'hidden', width:'100%' }}>
      <div style={{ height:'100%', width:`${pct*100}%`, background:color, borderRadius:99,
        transition:'width .5s cubic-bezier(.2,.8,.2,1)' }} />
    </div>
  );
}

function Glyph({ d, size=22, stroke=2, color='currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
      {Array.isArray(d) ? d.map((p,i)=><path key={i} d={p}/>) : <path d={d} />}
    </svg>
  );
}

const GLYPHS = {

  arrowUp:   'M12 19V6M6 12l6-6 6 6',
  arrowDown: 'M12 5v13M6 12l6 6 6-6',
  spark:     'M12 3v4m0 10v4M3 12h4m10 0h4M6 6l2.5 2.5M18 18l-2.5-2.5M6 18l2.5-2.5M18 6l-2.5 2.5',
};

Object.assign(window, { CatIcon, Donut, ProgressBar, Glyph, GLYPHS });

        </div>

}

function Dashboard({ tx, onOpenCategory, onOpenSettings, onOpenAdd }) {
  const { JORNAL, MONTH_LABEL, CATEGORIES } = window.FIN;

  const spentByCat = useMemo(() => {
    const m = {};
    for (const c of CATEGORIES) m[c.id] = 0;
    for (const t of tx) m[t.cat] = (m[t.cat]||0) + t.amount;
    return m;
  }, [tx]);

  const gastado    = CATEGORIES.filter(c=>c.type==='gasto').reduce((s,c)=>s+spentByCat[c.id],0);
  const invertido  = CATEGORIES.filter(c=>c.type==='inversion').reduce((s,c)=>s+spentByCat[c.id],0);
  const gastosFijos   = CATEGORIES.filter(c=>c.type==='gasto'&&c.flow==='fijo').reduce((s,c)=>s+spentByCat[c.id],0);
  const gastosDiarios = gastado - gastosFijos;
  const libre = JORNAL - gastado - invertido;
  const pct = (n) => JORNAL>0 ? Math.round(n/JORNAL*100) : 0;

  const gastoCats = CATEGORIES.filter(c=>c.type==='gasto'&&spentByCat[c.id]>0).sort((a,b)=>spentByCat[b.id]-spentByCat[a.id]);
  const slices = gastoCats.map(c=>({ value:spentByCat[c.id], color:c.color }));

  const activeCats = CATEGORIES.filter(c=>c.budget>0||spentByCat[c.id]>0).sort((a,b)=>spentByCat[b.id]-spentByCat[a.id]);
  const gastoActive   = activeCats.filter(c=>c.type==='gasto');
  const inversionActive = activeCats.filter(c=>c.type==='inversion');
  const catsFijos   = gastoActive.filter(c=>c.flow==='fijo');
  const catsDiarios = gastoActive.filter(c=>c.flow!=='fijo');
  const totalFijosCats   = catsFijos.reduce((s,c)=>s+spentByCat[c.id],0);
  const totalDiariosCats = catsDiarios.reduce((s,c)=>s+spentByCat[c.id],0);

  return (
    <div style={{ height:'100%', overflowY:'auto', overflowX:'hidden', padding:'0 0 120px' }}>
      {/* Header */}
      <div style={{ padding:'8px 22px 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontFamily:'var(--ui)', fontSize:14, color:'var(--ink-soft)', fontWeight:500 }}>Hola de nuevo 👋</div>

            )}
          </div>
        </div>
      </div>

      {/* Gastos fijos */}
      <SectionHead title="Gastos fijos" hint="Recurrentes cada mes" total={catsFijos.length?totalFijosCats:null} />
      {catsFijos.length===0
        ? <div style={{ margin:'0 18px', background:'var(--paper)', borderRadius:20, padding:'20px', textAlign:'center', fontFamily:'var(--ui)', fontSize:13, color:'var(--ink-soft)' }}>Sin gastos fijos todavía</div>
        : <div style={{ margin:'0 18px', display:'flex', flexDirection:'column', gap:10 }}>
            {catsFijos.map(c=><CatCard key={c.id} c={c} spent={spentByCat[c.id]} onOpen={onOpenCategory} />)}
          </div>
      }

      {/* Gastos diarios */}
      <SectionHead title="Gastos diarios" hint="Variables del día a día" total={catsDiarios.length?totalDiariosCats:null} />
      {catsDiarios.length===0
        ? <div style={{ margin:'0 18px', background:'var(--paper)', borderRadius:20, padding:'20px', textAlign:'center', fontFamily:'var(--ui)', fontSize:13, color:'var(--ink-soft)' }}>Sin gastos diarios todavía</div>

            {catsDiarios.map(c=><CatCard key={c.id} c={c} spent={spentByCat[c.id]} onOpen={onOpenCategory} />)}

      }

      {/* Inversión */}
      {inversionActive.length>0 &&
        <React.Fragment>
          <SectionHead title="Inversión" hint="Fondos y pensiones" total={inversionActive.reduce((s,c)=>s+spentByCat[c.id],0)} />
          <div style={{ margin:'0 18px', display:'flex', flexDirection:'column', gap:10 }}>

        </React.Fragment>

    </div>
  );
}

window.Dashboard = Dashboard;

  <script type="text/babel" data-presets="react">
function History({ tx }) {
  const { HISTORY } = window.FIN;
  const [metric, setMetric] = useState('ahorro');
  const [sel, setSel] = useState(HISTORY.length - 1);

  const data = HISTORY;
  const vals = data.map(d=>metric==='ahorro'?d.ahorro:d.gastos);
  const maxV = Math.max(...vals) * 1.15;
  const avg  = vals.reduce((s,x)=>s+x,0) / vals.length;

  const totalAhorro = data.reduce((s,d)=>s+d.ahorro,0);
  const bestMonth   = data.reduce((a,b)=>b.ahorro>a.ahorro?b:a);
  const avgRate     = Math.round((data.reduce((s,d)=>s+d.ahorro/d.jornal,0)/data.length)*100);
  const selData     = data[sel];
  const accent      = metric==='ahorro'?'#3E6B57':'var(--accent)';
  const chartH      = 150;

  return (
    <div style={{ height:'100%', overflowY:'auto', overflowX:'hidden', padding:'0 0 120px' }}>
      <div style={{ padding:'8px 22px 4px' }}>
        <div style={{ fontFamily:'var(--ui)', fontSize:14, color:'var(--ink-soft)', fontWeight:500 }}>Evolución</div>
        <div style={{ fontFamily:'var(--display)', fontSize:28, fontWeight:600, color:'var(--ink)', letterSpacing:'-.02em', marginTop:2 }}>Histórico 2026</div>
      </div>

      {/* Stat hero */}
      <div style={{ margin:'14px 18px 0', borderRadius:28, background:'var(--hero)', color:'#F4EFE6', padding:'20px 22px', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', bottom:-70, left:-30, width:200, height:200, borderRadius:'50%', background:'radial-gradient(circle, rgba(127,179,154,.22), transparent 70%)' }} />
        <div style={{ position:'relative', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <div style={{ fontFamily:'var(--ui)', fontSize:13, color:'rgba(244,239,230,.6)' }}>Ahorro acumulado</div>
            <div style={{ display:'flex', alignItems:'baseline', gap:6, marginTop:6 }}>
              <span style={{ fontFamily:'var(--display)', fontSize:38, fontWeight:600, letterSpacing:'-.025em', lineHeight:1, fontVariantNumeric:'tabular-nums' }}>{window.fmtNum(totalAhorro,0)}</span>
              <span style={{ fontFamily:'var(--display)', fontSize:20, color:'rgba(244,239,230,.7)' }}>€</span>
            </div>
            <div style={{ fontFamily:'var(--ui)', fontSize:12, color:'rgba(244,239,230,.5)', marginTop:7, whiteSpace:'nowrap' }}>en 6 meses · {avgRate}% de media</div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:5, background:'rgba(127,179,154,.18)', padding:'6px 11px', borderRadius:99 }}>
            <Glyph d={GLYPHS.arrowUp} size={14} color="#A6D4BE" stroke={2.4} />
            <span style={{ fontFamily:'var(--display)', fontSize:13, fontWeight:600, color:'#A6D4BE' }}>{avgRate}%</span>
          </div>
        </div>
      </div>

      {/* Gráfico */}
      <div style={{ margin:'16px 18px 0', borderRadius:28, background:'var(--paper)', padding:'18px 18px 16px',
        boxShadow:'0 1px 2px rgba(40,28,16,.05), 0 8px 24px -16px rgba(40,28,16,.18)' }}>
        <div style={{ display:'flex', background:'#00000008', borderRadius:13, padding:3, marginBottom:18 }}>
          {[['ahorro','Ahorro'],['gastos','Gastos']].map(([k,l])=>(
            <button key={k} onClick={()=>setMetric(k)} style={{
              all:'unset', cursor:'pointer', flex:1, textAlign:'center', padding:'7px 0', borderRadius:10,
              fontFamily:'var(--ui)', fontSize:13.5, fontWeight:600,
              color:metric===k?'var(--ink)':'var(--ink-soft)',
              background:metric===k?'var(--paper)':'transparent',
              boxShadow:metric===k?'0 1px 3px rgba(40,28,16,.12)':'none', transition:'all .2s' }}>{l}</button>
          ))}
        </div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--ui)', fontSize:12.5, color:'var(--ink-soft)' }}>{metric==='ahorro'?'Ahorrado':'Gastado'} en {selData.m}</div>
          <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
            <span style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:600, color:'var(--ink)', letterSpacing:'-.02em', fontVariantNumeric:'tabular-nums', whiteSpace:'nowrap' }}>{window.fmt(metric==='ahorro'?selData.ahorro:selData.gastos)}</span>
            {selData.current && <span style={{ fontFamily:'var(--ui)', fontSize:11, fontWeight:600, color:accent, background:accent+'18', padding:'3px 8px', borderRadius:99 }}>actual</span>}
          </div>
        </div>
        <div style={{ position:'relative', height:chartH, display:'flex', alignItems:'flex-end', gap:8 }}>
          <div style={{ position:'absolute', left:0, right:0, bottom:`${(avg/maxV)*chartH}px`, borderTop:'1.5px dashed #00000020', zIndex:1 }}>

          </div>
          {data.map((d,i)=>{
            const v = metric==='ahorro'?d.ahorro:d.gastos;
            const h = Math.max(4,(v/maxV)*chartH);
            const isSel = i===sel;
            return (
              <button key={d.m} onClick={()=>setSel(i)} style={{ all:'unset', cursor:'pointer', flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:7, height:'100%', justifyContent:'flex-end' }}>
                <div style={{ width:'100%', maxWidth:30, height:h, borderRadius:9,

              </button>
            );
          })}
        </div>
      </div>

      {/* Reparto mensual */}
      <div style={{ margin:'16px 18px 0', borderRadius:28, background:'var(--paper)', padding:'18px 22px 20px',
        boxShadow:'0 1px 2px rgba(40,28,16,.05), 0 8px 24px -16px rgba(40,28,16,.18)' }}>
        <div style={{ fontFamily:'var(--display)', fontSize:17, fontWeight:600, color:'var(--ink)', marginBottom:4 }}>Reparto del jornal</div>
        <div style={{ display:'flex', gap:16, marginBottom:16 }}>
          {[['Gastos','var(--accent)'],['Inversión','#7FB39A'],['Ahorro','#C9BBA6']].map(([l,c])=>(
            <div key={l} style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ width:8, height:8, borderRadius:3, background:c }} />
              <span style={{ fontFamily:'var(--ui)', fontSize:11.5, color:'var(--ink-soft)' }}>{l}</span>
            </div>
          ))}
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:13 }}>
          {data.map(d=>(
            <div key={d.m} style={{ display:'flex', alignItems:'center', gap:12 }}>
              <span style={{ fontFamily:'var(--ui)', fontSize:12, fontWeight:600, color:'var(--ink-soft)', width:26 }}>{d.m}</span>
              <div style={{ flex:1, display:'flex', height:9, borderRadius:99, overflow:'hidden', gap:1.5 }}>
                <div style={{ flex:d.gastos, background:'var(--accent)' }} />
                <div style={{ flex:d.inversion, background:'#7FB39A' }} />
                <div style={{ flex:d.ahorro, background:'#C9BBA6' }} />
              </div>
              <span style={{ fontFamily:'var(--display)', fontSize:12, fontWeight:600, color:'var(--ink)', width:46, textAlign:'right', fontVariantNumeric:'tabular-nums' }}>{window.fmtNum(d.ahorro,0)}€</span>
            </div>
          ))}
        </div>
      </div>

      {/* Stats */}
      <div style={{ display:'flex', gap:12, margin:'16px 18px 0' }}>
        {[['Mejor mes',bestMonth.m,window.fmt(bestMonth.ahorro)],['Media mensual','',window.fmt(Math.round(totalAhorro/data.length))]].map(([l,sub,v],i)=>(
          <div key={i} style={{ flex:1, background:'var(--paper)', borderRadius:22, padding:'16px 18px', boxShadow:'0 1px 2px rgba(40,28,16,.04)' }}>
            <div style={{ fontFamily:'var(--ui)', fontSize:12.5, color:'var(--ink-soft)' }}>{l}{sub&&<span style={{ color:'var(--ink)', fontWeight:600 }}> · {sub}</span>}</div>
            <div style={{ fontFamily:'var(--display)', fontSize:20, fontWeight:600, color:'var(--ink)', marginTop:5, fontVariantNumeric:'tabular-nums' }}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{ fontFamily:'var(--ui)', fontSize:11, color:'var(--ink-soft)', textAlign:'center', margin:'18px 30px 0', opacity:.7, lineHeight:1.5 }}>
        Junio y mayo con tus cifras reales. Meses anteriores de ejemplo hasta que registres más datos.
      </div>
    </div>
  );
}
window.History = History;
  </script>

  <!-- AddExpense + CategoryDetail -->
  <script type="text/babel" data-presets="react">
const SUGGEST = {
  casa:['Alquiler','Luz','Agua','Gasolina','Internet','Supermercado','Mascota'],
  autonomo:['Cuota autónomo','Gestoría'],
  ocio:['Cena','Cine','Copas','Salida finde','Concierto'],
  gym:['Cuota gym','Material'],
  fondos:['Aportación fondo'],
  pensiones:['Plan de pensiones'],
  ropa:['Camiseta','Zapatos','Abrigo'],
  regalos:['Cumpleaños','Detalle'],
  higiene:['Cosmética','Peluquería'],
  alimentacion:['Café','Delivery','Restaurante'],
  salud:['Farmacia','Seguro médico','Médico'],
  suscripciones:['Spotify','Netflix','iCloud'],
  formacion:['Curso','Libro'],
};

function AddSheet({ open, onClose, onSave, onDelete, editTx, presetCat }) {
  const { CATEGORIES, CAT } = window.FIN;
  const [amount, setAmount] = useState('0');
  const [catId,  setCatId]  = useState(presetCat||'ocio');
  const [desc,   setDesc]   = useState('');
  const [day,    setDay]    = useState(14);

  useEffect(() => {
    if (open) {
      if (editTx) { setAmount(String(editTx.amount).replace('.',',')); setCatId(editTx.cat); setDesc(editTx.desc); setDay(editTx.day); }
      else { setAmount('0'); setCatId(presetCat||'ocio'); setDesc(''); setDay(14); }
    }
  }, [open, editTx, presetCat]);

  const cat = CAT[catId];
  const numAmount = parseFloat(amount.replace(',','.')) || 0;

  const press = (k) => {
    setAmount(prev => {
      if (k==='del') { const n=prev.slice(0,-1); return n===''?'0':n; }
      if (k===',') { if (prev.includes(',')) return prev; return prev+','; }
      if (prev.includes(',') && prev.split(',')[1].length>=2) return prev;
      if (prev==='0' && k!==',') return k;
      if (prev.replace(',','').replace('.','').length>=7) return prev;
      return prev+k;
    });
  };

  const canSave = numAmount > 0;
  const save = () => {
    if (!canSave) return;
    onSave({ id:editTx?editTx.id:'t'+Date.now(), cat:catId, desc:desc||cat.name, amount:Math.round(numAmount*100)/100, day });
    onClose();
  };

  const suggestions = SUGGEST[catId] || [];

  return (
    <div style={{ position:'absolute', inset:0, zIndex:200, pointerEvents:open?'auto':'none' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(26,23,18,.4)',
        opacity:open?1:0, transition:'opacity .3s', backdropFilter:open?'blur(2px)':'none' }} />
      <div style={{ position:'absolute', left:0, right:0, bottom:0, background:'var(--bg)',
        borderRadius:'34px 34px 0 0', transform:open?'translateY(0)':'translateY(105%)',
        transition:'transform .42s cubic-bezier(.32,.72,0,1)', maxHeight:'94%', display:'flex', flexDirection:'column',
        boxShadow:'0 -10px 40px rgba(26,23,18,.18)' }}>
        <div style={{ padding:'10px 0 0', display:'flex', flexDirection:'column', alignItems:'center', flexShrink:0 }}>
          <div style={{ width:40, height:5, borderRadius:99, background:'#00000018' }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 20px 4px', flexShrink:0 }}>
          <button onClick={onClose} style={{ all:'unset', cursor:'pointer', fontFamily:'var(--ui)', fontSize:15, color:'var(--ink-soft)' }}>Cancelar</button>
          <span style={{ fontFamily:'var(--display)', fontSize:16, fontWeight:600, color:'var(--ink)' }}>{editTx?'Editar gasto':'Nuevo gasto'}</span>
          <button onClick={save} style={{ all:'unset', cursor:canSave?'pointer':'default', fontFamily:'var(--ui)', fontSize:15, fontWeight:700, color:canSave?'var(--accent)':'var(--ink-soft)', opacity:canSave?1:.5 }}>Guardar</button>
        </div>

        <div style={{ overflowY:'auto', flex:1, padding:'0 0 8px' }}>
          <div style={{ textAlign:'center', padding:'16px 0 10px' }}>
            <div style={{ display:'inline-flex', alignItems:'baseline', gap:6 }}>
              <span style={{ fontFamily:'var(--display)', fontSize:54, fontWeight:600, color:numAmount>0?'var(--ink)':'#00000028', letterSpacing:'-.03em', fontVariantNumeric:'tabular-nums' }}>{amount}</span>
              <span style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:500, color:'#00000035' }}>€</span>
            </div>
            <div style={{ marginTop:4, fontFamily:'var(--ui)', fontSize:12.5, color:'var(--ink-soft)' }}>
              {cat.type==='inversion'?'Inversión':'Gasto'} · {cat.name}
            </div>
          </div>

          <div style={{ display:'flex', gap:9, overflowX:'auto', padding:'6px 18px 10px', scrollbarWidth:'none' }}>
            {CATEGORIES.map(c=>(
              <button key={c.id} onClick={()=>{setCatId(c.id);setDesc('');}} style={{
                all:'unset', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:6, flexShrink:0, width:62 }}>
                <div style={{ width:50, height:50, borderRadius:16, display:'flex', alignItems:'center', justifyContent:'center',
                  background:catId===c.id?c.color:c.color+'14', color:catId===c.id?'#fff':c.color,
                  transition:'all .18s', boxShadow:catId===c.id?`0 6px 14px -4px ${c.color}88`:'none' }}>

function CategoryDetail({ catId, tx, onBack, onEdit, onAddInCat }) {
  const { CAT } = window.FIN;
  const cat = CAT[catId];
  const list = tx.filter(t=>t.cat===catId).sort((a,b)=>b.day-a.day);
  const spent = list.reduce((s,t)=>s+t.amount,0);
  const over = cat.budget>0 && spent>cat.budget;

  return (
    <div style={{ height:'100%', overflowY:'auto', overflowX:'hidden', padding:'0 0 120px', background:'var(--bg)' }}>

      </div>

      <div style={{ padding:'12px 22px 6px', display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center' }}>

        <div style={{ fontFamily:'var(--display)', fontSize:22, fontWeight:600, color:'var(--ink)', marginTop:12 }}>{cat.name}</div>
        <div style={{ fontFamily:'var(--ui)', fontSize:13, color:'var(--ink-soft)', marginTop:2 }}>{cat.sub}</div>
        <div style={{ display:'flex', alignItems:'baseline', gap:6, marginTop:14 }}>
          <span style={{ fontFamily:'var(--display)', fontSize:40, fontWeight:600, color:'var(--ink)', letterSpacing:'-.02em', fontVariantNumeric:'tabular-nums' }}>{window.fmtNum(spent,2)}</span>
          <span style={{ fontFamily:'var(--display)', fontSize:22, color:'var(--ink-soft)' }}>€</span>
        </div>
        {cat.budget>0 && (
          <div style={{ width:'70%', marginTop:14 }}>
            <ProgressBar value={spent} max={cat.budget} color={over?'var(--accent)':cat.color} height={8} />
            <div style={{ fontFamily:'var(--ui)', fontSize:12, color:over?'var(--accent)':'var(--ink-soft)', marginTop:8 }}>
              {over?`${window.fmt(spent-cat.budget)} por encima del presupuesto`:`${window.fmt(cat.budget-spent)} libres de ${window.fmt(cat.budget)}`}
            </div>
          </div>
        )}
      </div>

      <div style={{ fontFamily:'var(--display)', fontSize:15, fontWeight:600, color:'var(--ink)', padding:'20px 24px 10px' }}>Movimientos · {list.length}</div>
      <div style={{ margin:'0 18px', background:'var(--paper)', borderRadius:22, overflow:'hidden', boxShadow:'0 1px 2px rgba(40,28,16,.04)' }}>
        {list.length===0 && <div style={{ padding:'28px', textAlign:'center', fontFamily:'var(--ui)', fontSize:14, color:'var(--ink-soft)' }}>Sin movimientos todavía</div>}
        {list.map((t,i)=>(
          <button key={t.id} onClick={()=>onEdit(t)} style={{ all:'unset', cursor:'pointer', display:'flex', alignItems:'center', gap:12, padding:'14px 16px',
            borderBottom:i<list.length-1?'0.5px solid rgba(60,50,40,.10)':'none', width:'100%', boxSizing:'border-box' }}>
            <div style={{ width:38, height:38, borderRadius:11, background:cat.color+'14', color:cat.color, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={cat.icon}/></svg>
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontFamily:'var(--ui)', fontSize:15, fontWeight:600, color:'var(--ink)' }}>{t.desc}</div>
              <div style={{ fontFamily:'var(--ui)', fontSize:12, color:'var(--ink-soft)', marginTop:1 }}>{t.day} jun 2026</div>
            </div>
            <span style={{ fontFamily:'var(--display)', fontSize:16, fontWeight:600, color:'var(--ink)', fontVariantNumeric:'tabular-nums', whiteSpace:'nowrap', flexShrink:0 }}>−{window.fmt(t.amount)}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { AddSheet, CategoryDetail });

  <script type="text/babel" data-presets="react">
const CAT_COLORS = ['#D85C32','#E0913C','#C99A4B','#3E6B57','#4E7E86','#5F8A7A','#2E7D5B','#4E7CA8','#7C6B9C','#A85B5B','#B0623F','#C98A5B','#8C9A86','#6B6E78'];

function slug(s) { return (s||'cat').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,16)||'cat'; }

function CategoriesManager({ open, onClose, tx, onAdd, onUpdate, onDelete }) {
  const { CATEGORIES, ICONS } = window.FIN;
  const [view, setView] = useState('list');
  const [draft, setDraft] = useState(null);
  const [confirmDel, setConfirmDel] = useState(false);

  useEffect(() => { if (open) { setView('list'); setConfirmDel(false); } }, [open]);

  const iconKeys = Object.keys(ICONS);
  const spentByCat = {};
  for (const t of tx) spentByCat[t.cat] = (spentByCat[t.cat]||0) + t.amount;

  const startNew = () => { setDraft({ id:null, name:'', sub:'', budget:'', type:'gasto', flow:'diario', color:CAT_COLORS[0], icon:ICONS[iconKeys[0]] }); setConfirmDel(false); setView('edit'); };
  const startEdit = (c) => { setDraft({...c, budget:c.budget?String(c.budget).replace('.',','):''}); setConfirmDel(false); setView('edit'); };

  const save = () => {
    const name = (draft.name||'').trim();
    if (!name) return;
    const budget = parseFloat(String(draft.budget).replace(',','.')) || 0;
    const payload = {
      id: draft.id || slug(name)+'-'+Date.now().toString(36).slice(-4),
      name, sub:(draft.sub||'').trim()||(draft.type==='inversion'?'Inversión':draft.flow==='fijo'?'Gasto fijo':'Gasto diario'),
      budget, type:draft.type, color:draft.color, icon:draft.icon
    };
    if (draft.type==='gasto') payload.flow = draft.flow||'diario';
    if (draft.id) onUpdate(payload); else onAdd(payload);
    setView('list');
  };

  const removeCat = () => { onDelete(draft.id); setView('list'); setConfirmDel(false); };
  const D = (k,v) => setDraft(p=>({...p,[k]:v}));

  return (
    <div style={{ position:'absolute', inset:0, zIndex:195, pointerEvents:open?'auto':'none' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(26,23,18,.4)', opacity:open?1:0, transition:'opacity .3s' }} />
      <div style={{ position:'absolute', left:0, right:0, bottom:0, background:'var(--bg)',
        borderRadius:'34px 34px 0 0', transform:open?'translateY(0)':'translateY(105%)',
        transition:'transform .42s cubic-bezier(.32,.72,0,1)', height:'92%', display:'flex', flexDirection:'column',
        boxShadow:'0 -10px 40px rgba(26,23,18,.18)' }}>
        <div style={{ padding:'10px 0 0', display:'flex', justifyContent:'center', flexShrink:0 }}>
          <div style={{ width:40, height:5, borderRadius:99, background:'#00000018' }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 20px 6px', flexShrink:0 }}>
          {view==='edit'
            ? <button onClick={()=>setView('list')} style={{ all:'unset', cursor:'pointer', fontFamily:'var(--ui)', fontSize:15, color:'var(--ink-soft)', width:70 }}>‹ Atrás</button>
            : <span style={{ width:70 }} />}
          <span style={{ fontFamily:'var(--display)', fontSize:16, fontWeight:600, color:'var(--ink)' }}>
            {view==='edit' ? (draft&&draft.id?'Editar categoría':'Nueva categoría') : 'Categorías'}
          </span>
          {view==='edit'
            ? <button onClick={save} style={{ all:'unset', cursor:'pointer', width:70, textAlign:'right', fontFamily:'var(--ui)', fontSize:15, fontWeight:700, color:draft&&draft.name.trim()?'var(--accent)':'var(--ink-soft)', opacity:draft&&draft.name.trim()?1:.5 }}>Guardar</button>
            : <button onClick={onClose} style={{ all:'unset', cursor:'pointer', width:70, textAlign:'right', fontFamily:'var(--ui)', fontSize:15, fontWeight:600, color:'var(--accent)' }}>Hecho</button>}
        </div>

        <div style={{ overflowY:'auto', flex:1, padding:'8px 18px calc(env(safe-area-inset-bottom) + 24px)' }}>
          {view==='list' ?
            <React.Fragment>
              <button onClick={startNew} style={{ all:'unset', cursor:'pointer', display:'flex', alignItems:'center', gap:12, width:'100%', boxSizing:'border-box',
                background:'var(--accent)', color:'#fff', borderRadius:18, padding:'14px 16px', margin:'4px 0 16px', boxShadow:'0 6px 16px -6px var(--accent)' }}>
                <div style={{ width:32, height:32, borderRadius:10, background:'rgba(255,255,255,.2)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <Glyph d={GLYPHS.plus} size={19} stroke={2.4} color="#fff" />
                </div>
                <span style={{ fontFamily:'var(--ui)', fontSize:15, fontWeight:700 }}>Nueva categoría</span>
              </button>
              <div style={{ background:'var(--paper)', borderRadius:22, overflow:'hidden', boxShadow:'0 1px 2px rgba(40,28,16,.04)' }}>
                {CATEGORIES.map((c,i)=>
                  <button key={c.id} onClick={()=>startEdit(c)} style={{ all:'unset', cursor:'pointer', display:'flex', alignItems:'center', gap:13, padding:'12px 15px',
                    borderBottom:i<CATEGORIES.length-1?'0.5px solid rgba(60,50,40,.10)':'none', width:'100%', boxSizing:'border-box' }}>
                    <div style={{ width:38, height:38, borderRadius:11, background:c.color+'18', color:c.color, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={c.icon}/></svg>
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontFamily:'var(--ui)', fontSize:15, fontWeight:600, color:'var(--ink)' }}>{c.name}</div>
                      <div style={{ fontFamily:'var(--ui)', fontSize:12, color:'var(--ink-soft)', marginTop:1 }}>
                        {c.type==='inversion'?'Inversión':c.flow==='fijo'?'Gasto fijo':'Gasto diario'}{c.budget>0?` · ${window.fmt(c.budget)}/mes`:' · sin presupuesto'}
                      </div>
                    </div>
                    <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink:0 }}><path d="M1 1l6 6-6 6" stroke="rgba(60,50,40,.3)" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </button>
                )}
              </div>
              <div style={{ fontFamily:'var(--ui)', fontSize:11.5, color:'var(--ink-soft)', textAlign:'center', marginTop:16, opacity:.75, lineHeight:1.5 }}>
                Toca una categoría para editar su nombre, presupuesto, color o icono — o bórrala.
              </div>
            </React.Fragment>
            : draft &&
            <React.Fragment>
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'6px 0 18px' }}>
                <div style={{ width:64, height:64, borderRadius:20, background:draft.color+'1A', color:draft.color, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={draft.icon}/></svg>
                </div>
              </div>

              <label style={{ display:'block', fontFamily:'var(--ui)', fontSize:12.5, fontWeight:600, color:'var(--ink-soft)', padding:'0 4px 7px' }}>Nombre</label>
              <input value={draft.name} onChange={e=>D('name',e.target.value)} placeholder="p. ej. Viajes"
                style={{ width:'100%', boxSizing:'border-box', border:'none', outline:'none', background:'var(--paper)', borderRadius:15, padding:'14px 16px',
                  fontFamily:'var(--ui)', fontSize:16, fontWeight:600, color:'var(--ink)', boxShadow:'0 1px 2px rgba(40,28,16,.05)' }} />

              <div style={{ fontFamily:'var(--ui)', fontSize:12.5, fontWeight:600, color:'var(--ink-soft)', padding:'18px 4px 8px' }}>Tipo</div>
              <div style={{ display:'flex', background:'#00000008', borderRadius:14, padding:3 }}>
                {[['gasto','Gasto'],['inversion','Inversión']].map(([k,l])=>
                  <button key={k} onClick={()=>D('type',k)} style={{ all:'unset', cursor:'pointer', flex:1, textAlign:'center', padding:'9px 0', borderRadius:11,
                    fontFamily:'var(--ui)', fontSize:14, fontWeight:600, color:draft.type===k?'var(--ink)':'var(--ink-soft)',
                    background:draft.type===k?'var(--paper)':'transparent', boxShadow:draft.type===k?'0 1px 3px rgba(40,28,16,.12)':'none' }}>{l}</button>
                )}
              </div>

              {draft.type==='gasto' &&
                <React.Fragment>
                  <div style={{ fontFamily:'var(--ui)', fontSize:12.5, fontWeight:600, color:'var(--ink-soft)', padding:'18px 4px 8px' }}>Frecuencia</div>
                  <div style={{ display:'flex', gap:10 }}>
                    {[['fijo','Gasto fijo','Recurrente cada mes','var(--accent)'],['diario','Gasto diario','Variable del día a día','#E0913C']].map(([k,l,sub,col])=>
                      <button key={k} onClick={()=>D('flow',k)} style={{ all:'unset', cursor:'pointer', flex:1, boxSizing:'border-box', borderRadius:15, padding:'12px 13px',
                        background:'var(--paper)', boxShadow:(draft.flow||'diario')===k?`0 0 0 2px ${col}`:'0 1px 2px rgba(40,28,16,.05)', transition:'box-shadow .15s' }}>
                        <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                          <span style={{ width:9, height:9, borderRadius:99, background:col, flexShrink:0 }} />
                          <span style={{ fontFamily:'var(--ui)', fontSize:13.5, fontWeight:700, color:'var(--ink)', whiteSpace:'nowrap' }}>{l}</span>
                        </div>
                        <div style={{ fontFamily:'var(--ui)', fontSize:11, color:'var(--ink-soft)', marginTop:5, lineHeight:1.3 }}>{sub}</div>
                      </button>
                    )}
                  </div>
                </React.Fragment>
              }

              <div style={{ fontFamily:'var(--ui)', fontSize:12.5, fontWeight:600, color:'var(--ink-soft)', padding:'18px 4px 8px' }}>Presupuesto mensual (opcional)</div>
              <div style={{ display:'flex', alignItems:'center', background:'var(--paper)', borderRadius:15, padding:'0 16px', boxShadow:'0 1px 2px rgba(40,28,16,.05)' }}>
                <input value={draft.budget} onChange={e=>D('budget',e.target.value.replace(/[^0-9,.]/g,''))} inputMode="decimal" placeholder="0"
                  style={{ flex:1, border:'none', outline:'none', background:'transparent', padding:'14px 0', fontFamily:'var(--display)', fontSize:18, fontWeight:600, color:'var(--ink)' }} />
                <span style={{ fontFamily:'var(--display)', fontSize:17, color:'var(--ink-soft)' }}>€</span>
              </div>

              <div style={{ fontFamily:'var(--ui)', fontSize:12.5, fontWeight:600, color:'var(--ink-soft)', padding:'18px 4px 10px' }}>Color</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:11, padding:'0 2px' }}>
                {CAT_COLORS.map(col=>
                  <button key={col} onClick={()=>D('color',col)} style={{ all:'unset', cursor:'pointer', width:34, height:34, borderRadius:11, background:col,
                    boxShadow:draft.color===col?`0 0 0 3px var(--bg), 0 0 0 5px ${col}`:'0 1px 2px rgba(40,28,16,.1)', transition:'box-shadow .15s' }} />
                )}
              </div>

              <div style={{ fontFamily:'var(--ui)', fontSize:12.5, fontWeight:600, color:'var(--ink-soft)', padding:'20px 4px 10px' }}>Icono</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:9 }}>
                {iconKeys.map(k=>{
                  const sel = draft.icon===ICONS[k];
                  return (
                    <button key={k} onClick={()=>D('icon',ICONS[k])} style={{ all:'unset', cursor:'pointer', aspectRatio:'1', borderRadius:13, display:'flex', alignItems:'center', justifyContent:'center',
                      background:sel?draft.color:'var(--paper)', color:sel?'#fff':'var(--ink-soft)', boxShadow:'0 1px 2px rgba(40,28,16,.05)', transition:'all .15s' }}>
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[k]}/></svg>
                    </button>
                  );
                })}
              </div>

              {draft.id &&
                <div style={{ marginTop:26 }}>
                  {!confirmDel ?
                    <button onClick={()=>setConfirmDel(true)} style={{ all:'unset', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8, width:'100%', boxSizing:'border-box',
                      padding:'13px', borderRadius:15, background:'#D85C3212', color:'var(--accent)', fontFamily:'var(--ui)', fontSize:14, fontWeight:600 }}>
                      <Glyph d={GLYPHS.trash} size={17} stroke={1.9} /> Borrar categoría
                    </button> :
                    <div style={{ background:'var(--paper)', borderRadius:16, padding:'16px', boxShadow:'0 1px 2px rgba(40,28,16,.05)' }}>
                      <div style={{ fontFamily:'var(--ui)', fontSize:13.5, color:'var(--ink)', fontWeight:600, marginBottom:4 }}>¿Borrar "{draft.name}"?</div>
                      <div style={{ fontFamily:'var(--ui)', fontSize:12.5, color:'var(--ink-soft)', marginBottom:14, lineHeight:1.45 }}>
                        {spentByCat[draft.id]>0?`Se eliminarán también sus ${tx.filter(t=>t.cat===draft.id).length} movimientos.`:'Esta categoría no tiene movimientos.'}
                      </div>
                      <div style={{ display:'flex', gap:10 }}>
                        <button onClick={()=>setConfirmDel(false)} style={{ all:'unset', cursor:'pointer', flex:1, textAlign:'center', padding:'11px', borderRadius:12, background:'#00000008', fontFamily:'var(--ui)', fontSize:14, fontWeight:600, color:'var(--ink)' }}>Cancelar</button>
                        <button onClick={removeCat} style={{ all:'unset', cursor:'pointer', flex:1, textAlign:'center', padding:'11px', borderRadius:12, background:'var(--accent)', fontFamily:'var(--ui)', fontSize:14, fontWeight:700, color:'#fff' }}>Borrar</button>
                      </div>
                    </div>
                  }
                </div>
              }
            </React.Fragment>
          }
        </div>
      </div>
    </div>
  );
}
window.CategoriesManager = CategoriesManager;
  </script>

  <!-- App root -->
  <script type="text/babel" data-presets="react">
const LS_KEY   = 'fin_tx_v2';
const LS_CATS  = 'fin_cats_v2';
const LS_JORNAL= 'fin_jornal_v1';

function App() {
  const { SEED_TX, DEFAULT_CATEGORIES, JORNAL: JORNAL_DEFAULT } = window.FIN;

  const [tx, setTx] = useState(() => {
    try { const s=localStorage.getItem(LS_KEY); if(s) return JSON.parse(s); } catch(e){}
    return SEED_TX;
  });
  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(tx)); } catch(e){} }, [tx]);

  const [cats, setCats] = useState(() => {
    let loaded=null;
    try { const s=localStorage.getItem(LS_CATS); if(s) loaded=JSON.parse(s); } catch(e){}
    const base = loaded || DEFAULT_CATEGORIES.map(c=>({...c}));
    return base.map(c=>c.type==='gasto'&&!c.flow?{...c,flow:'diario'}:c);
  });
  useEffect(() => { try { localStorage.setItem(LS_CATS, JSON.stringify(cats)); } catch(e){} }, [cats]);

  const [jornal, setJornal] = useState(() => {
    try { const s=localStorage.getItem(LS_JORNAL); if(s!=null) return JSON.parse(s); } catch(e){}
    return JORNAL_DEFAULT;
  });
  useEffect(() => { try { localStorage.setItem(LS_JORNAL, JSON.stringify(jornal)); } catch(e){} }, [jornal]);

  window.FIN.CATEGORIES = cats;
  window.FIN.CAT = Object.fromEntries(cats.map(c=>[c.id,c]));
  window.FIN.JORNAL = jornal;

  const [tab,       setTab]       = useState('home');
  const [detailCat, setDetailCat] = useState(null);
  const [sheet,     setSheet]     = useState(false);
  const [editTx,    setEditTx]    = useState(null);
  const [presetCat, setPresetCat] = useState(null);
  const [settings,  setSettings]  = useState(false);
  const [manageCats,setManageCats]= useState(false);

  const saveTx = (t) => setTx(prev => {
    const i=prev.findIndex(x=>x.id===t.id);
    if(i>=0) { const n=[...prev]; n[i]=t; return n; }
    return [...prev,t];
  });
  const delTx = (id) => setTx(prev=>prev.filter(x=>x.id!==id));

  const openNew      = () => { setEditTx(null); setPresetCat(detailCat||null); setSheet(true); };
  const openEdit     = (t) => { setEditTx(t); setPresetCat(null); setSheet(true); };
  const openAddInCat = (c) => { setEditTx(null); setPresetCat(c); setSheet(true); };

  const addCat    = (c)  => setCats(prev=>[...prev,c]);
  const updateCat = (c)  => setCats(prev=>prev.map(x=>x.id===c.id?c:x));
  const deleteCat = (id) => { setCats(prev=>prev.filter(x=>x.id!==id)); setTx(prev=>prev.filter(t=>t.cat!==id)); };
  const reset     = ()   => { setTx([]); setCats(DEFAULT_CATEGORIES.map(c=>({...c}))); setJornal(0); };

  return (
    <div style={{ height:'100%', position:'relative', background:'var(--bg)', overflow:'hidden' }}>
      <div style={{ height:'100%', paddingTop:'56px' }}>
        {detailCat
          ? <CategoryDetail catId={detailCat} tx={tx} onBack={()=>setDetailCat(null)} onEdit={openEdit} onAddInCat={openAddInCat} />
          : tab==='home'
            ? <Dashboard tx={tx} onOpenCategory={setDetailCat} onOpenSettings={()=>setSettings(true)} onOpenAdd={openNew} />
            : <History tx={tx} />
        }
      </div>

      {/* Fade top */}
      <div style={{ position:'absolute', top:0, left:0, right:0, height:'58px', zIndex:30, pointerEvents:'none',
        background:'linear-gradient(var(--bg) 60%, transparent)' }} />

      {/* Tab bar */}
      {!detailCat && (
        <div style={{ position:'absolute', left:0, right:0, bottom:0, zIndex:40, paddingBottom:'18px',
          display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, background:'var(--hero)', borderRadius:99,
            padding:'7px 8px', boxShadow:'0 12px 30px -8px rgba(26,23,18,.5)' }}>
            <TabBtn label="Inicio" active={tab==='home'} onClick={()=>setTab('home')} d={GLYPHS.home} />
            <button onClick={openNew} style={{ all:'unset', cursor:'pointer', width:52, height:52, borderRadius:99, background:'var(--accent)',
              display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 6px 16px -4px var(--accent)', margin:'0 1px' }}>
              <Glyph d={GLYPHS.plus} size={26} stroke={2.4} color="#fff" />
            </button>
            <TabBtn label="Histórico" active={tab==='history'} onClick={()=>setTab('history')} d={GLYPHS.chart} />
          </div>
        </div>
      )}

      <AddSheet open={sheet} onClose={()=>setSheet(false)} onSave={saveTx} onDelete={delTx} editTx={editTx} presetCat={presetCat} />
      <AjustesSheet open={settings} onClose={()=>setSettings(false)} tx={tx}
        jornal={jornal} onSetJornal={setJornal}
        onEditTx={(t)=>{ setSettings(false); setTimeout(()=>openEdit(t),260); }}
        onManageCats={()=>{ setSettings(false); setTimeout(()=>setManageCats(true),260); }}
        onReset={reset} />
      <CategoriesManager open={manageCats} onClose={()=>setManageCats(false)} tx={tx}
        onAdd={addCat} onUpdate={updateCat} onDelete={deleteCat} />
    </div>
  );
}

function TabBtn({ label, active, onClick, d }) {
  return (
    <button onClick={onClick} style={{ all:'unset', cursor:'pointer', display:'flex', alignItems:'center', gap:7,
      padding:'12px 16px', borderRadius:99, background:active?'rgba(244,239,230,.12)':'transparent', transition:'background .2s' }}>
      <Glyph d={d} size={21} stroke={2} color={active?'#F4EFE6':'rgba(244,239,230,.5)'} />
      <span style={{ fontFamily:'var(--ui)', fontSize:13.5, fontWeight:600, color:active?'#F4EFE6':'rgba(244,239,230,.5)' }}>{label}</span>
    </button>
  );
}

window.App = App;
  </script>

  <!-- Mount -->
  <script type="text/babel" data-presets="react">
const DEV_W = 402, DEV_H = 874;
function Root() {
  return (
    <IOSDevice width={DEV_W} height={DEV_H} dark={false}>
      <App />
    </IOSDevice>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

function fit() {
  const pad = 24;
  const s = Math.min((window.innerWidth-pad*2)/DEV_W, (window.innerHeight-pad*2)/DEV_H, 1.05);
  document.getElementById('stage').style.transform = 'scale('+s+')';
}
window.addEventListener('resize', fit);
setTimeout(fit, 60); fit();
  </script>
</body>
</html>
